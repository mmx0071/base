# preview-webhook Deployment 骨架（设计样例）
# GitHub / image-ready 入口；仅写 PreviewEnvironment spec，不 Reconcile 工作负载
# RBAC 见 rbac-operator.yaml；公网暴露见 docs/minikube实现预案.md §10
---
apiVersion: v1
kind: Service
metadata:
  name: preview-webhook
  namespace: preview-system
  labels:
    app.kubernetes.io/name: preview-webhook
spec:
  selector:
    app.kubernetes.io/name: preview-webhook
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: preview-webhook
  namespace: preview-system
  labels:
    app.kubernetes.io/name: preview-webhook
    app.kubernetes.io/component: webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: preview-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: preview-webhook
    spec:
      serviceAccountName: preview-webhook
      containers:
        - name: webhook
          image: preview-webhook:dev   # 实现后本地 build + minikube image load
          imagePullPolicy: IfNotPresent
          env:
            - name: PREVIEW_DOMAIN
              value: preview.local
            - name: REGISTRY
              value: ghcr.io/myorg          # 与 Actions 推送前缀一致
            - name: ALLOWED_REPOS
              value: myorg/preview-demo     # 逗号分隔白名单
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: preview-webhook-secrets
                  key: github-webhook-secret
            - name: IMAGE_READY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: preview-webhook-secrets
                  key: image-ready-token
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 32Mi
