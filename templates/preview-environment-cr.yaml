# 生产向 PreviewEnvironment CR 样例（请替换占位符）
# - 命名: docs/operator-go设计.md §4.3；Minikube 见 preview-environment-cr-minikube.yaml
# - status 仅由 Go preview-operator 写入；Webhook 仅写 spec
apiVersion: preview.platform.io/v1alpha1
kind: PreviewEnvironment
metadata:
  name: myorg-myapp-pr-42
  labels:
    preview.platform.io/enabled: "true"
    preview.platform.io/repo: myorg-myapp
    preview.platform.io/pr-number: "42"
    preview.platform.io/cr: myorg-myapp-pr-42
spec:
  repoFullName: myorg/myapp
  prNumber: 42
  headSHA: a1b2c3d4e5f6789012345678abcdef012345678
  headBranch: feat/login
  image: registry.example.com/myapp:pr-42-a1b2c3d
  host: pr-42-myorg-myapp.preview.example.com
  profile: default
  replicas: 1
  containerPort: 8080
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  env:
    - name: APP_ENV
      value: preview
  secretRef: myorg-myapp-pr-42-secrets
  ttlHours: 72
# status 示例（Operator 写入；image 为空时 phase=Pending，无 url）
# status:
#   phase: Pending
#   observedSHA: ""
#   conditions: []
