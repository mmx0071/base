# 业务仓库 .github/workflows/preview-build.yml 参考模板
# 复制到业务 repo 后替换 REGISTRY、APP_NAME、PREVIEW_CALLBACK_URL
name: Preview Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

# 慢 build / 连续 push 时取消旧 workflow，避免旧镜像 image-ready 覆盖新 commit
concurrency:
  group: preview-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set vars
        id: vars
        run: |
          echo "pr=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "image=${REGISTRY}/${APP_NAME}:pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
        env:
          REGISTRY: registry.example.com
          APP_NAME: myapp
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: registry.example.com
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.image }}

      - name: Notify preview platform
        run: |
          body=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --argjson pr ${{ github.event.pull_request.number }} \
            --arg sha "${{ steps.vars.outputs.sha }}" \
            --arg image "${{ steps.vars.outputs.image }}" \
            '{repoFullName: $repo, prNumber: $pr, headSHA: $sha, image: $image}')
          for delay in 2 4 8 16 32; do
            code=$(curl -s -o /tmp/preview-resp -w "%{http_code}" -X POST "${PREVIEW_CALLBACK_URL}" \
              -H "Authorization: Bearer ${PREVIEW_CALLBACK_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${body}")
            if [ "${code}" = "200" ] || [ "${code}" = "204" ]; then
              exit 0
            fi
            if [ "${code}" != "404" ]; then
              cat /tmp/preview-resp >&2
              exit 1
            fi
            echo "CR not ready (404), retry in ${delay}s..."
            sleep "${delay}"
          done
          echo "image-ready failed after retries" >&2
          exit 1
        env:
          PREVIEW_CALLBACK_URL: https://preview-hooks.example.com/api/v1/preview/image-ready
          PREVIEW_CALLBACK_TOKEN: ${{ secrets.PREVIEW_CALLBACK_TOKEN }}

# 说明：
# - PR closed 由 GitHub Webhook 通知平台删 CR，无需本 workflow 处理
# - 业务 CI 不得 kubectl apply 到集群
# - 镜像 tag 须符合平台 Validating 规则：REGISTRY 前缀 + pr-{n}-{short_sha}
# - image-ready 请求体含 headSHA；平台应拒绝与 CR 当前 spec.headSHA 不一致的回调（见 ../项目评审方案.md §4）
