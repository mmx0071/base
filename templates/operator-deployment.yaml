# preview-operator Deployment 骨架（设计样例）
# 镜像 tag / 资源 limits 由实现仓 Makefile 生成后替换
# RBAC 见 rbac-operator.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: preview-operator
  namespace: preview-system
  labels:
    app.kubernetes.io/name: preview-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: preview-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: preview-operator
    spec:
      serviceAccountName: preview-operator
      containers:
        - name: manager
          image: preview-operator:dev   # 实现后: 本地 build / 推送到 Registry
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
          env:
            - name: PREVIEW_NAMESPACE
              value: preview
            - name: PREVIEW_DOMAIN
              value: preview.local
            - name: INGRESS_CLASS
              value: nginx
            # - name: REGISTRY
            #   value: registry.example.com
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
